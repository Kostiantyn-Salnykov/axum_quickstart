version: "3"

dotenv:
  - .env

includes:
  mig:
    taskfile: ./infrastructure/migrations/Taskfile.yaml
    dir: ./

tasks:
  default:
    desc: Run the application in local mode.
    cmds:
      - task: local

  run:
    desc: Run the bootstrap application.
    cmds:
      - cargo run

  check:
    desc: Run cargo check for the whole workspace.
    cmds:
      - cargo check --workspace
      - cargo clippy --workspace --all-targets -- -D warnings

  test:
    desc: Run all workspace tests.
    cmds:
      - cargo test --workspace

  fmt:
    desc: Format the whole workspace.
    cmds:
      - cargo fmt --all

  fmt-check:
    desc: Check formatting without changing files.
    cmds:
      - cargo fmt --all --check

  pre:
    desc: Run pre-commit checks.
    cmds:
      - task: fmt
      - task: check
      - task: test

  pipeline:
    desc: Clear terminal, format, test, build and run in release mode.
    cmds:
      - task: pre
      - cargo build --workspace
      - cargo run --release

  local:
    desc: Run the application in local mode.
    cmds:
      - task: pre
      - task: run

  entity:
    desc: "Regenerate SeaORM entities from the database."
    vars:
      DATABASE_URL: "postgres://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@{{.POSTGRES_HOST}}:{{.POSTGRES_PORT}}/{{.POSTGRES_DB}}"
    cmds:
      - sea-orm-cli generate entity
        -u "{{.DATABASE_URL}}"
        -o infrastructure/src/adapters/persistence/seaorm/entities
        --ignore-tables migrations
        --database-schema "{{.POSTGRES_SCHEMA}}"