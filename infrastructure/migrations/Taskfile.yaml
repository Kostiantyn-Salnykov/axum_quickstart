version: "3"

tasks:
  up:
    desc: "Apply pending migrations."
    cmds:
      - cargo run -p migrations -- up {{.CLI_ARGS}}

  down:
    desc: "Roll back applied migrations."
    cmds:
      - cargo run -p migrations -- down {{.CLI_ARGS}}

  fresh:
    desc: "Drop all tables and reapply migrations."
    cmds:
      - cargo run -p migrations -- fresh

  reset:
    desc: "Roll back all applied migrations."
    cmds:
      - cargo run -p migrations -- reset

  status:
    desc: "Show pending migrations."
    cmds:
      - cargo run -p migrations -- status

  generate:
    desc: "Generate a new SeaORM migration file. Usage: task migrations:generate NAME=create_posts"
    requires:
      vars: [NAME]
    cmds:
      - sea-orm-cli migrate generate {{.NAME}} -d infrastructure/migrations

  entity:
    desc: "Regenerate SeaORM entities from the database."
    vars:
      DATABASE_URL: "postgres://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@{{.POSTGRES_HOST}}:{{.POSTGRES_PORT}}/{{.POSTGRES_DB}}"
    cmds:
      - sea-orm-cli generate entity
        -u "{{.DATABASE_URL}}"
        -o infrastructure/src/adapters/persistence/seaorm/entities
        --ignore-tables migrations
        --database-schema "{{.POSTGRES_SCHEMA}}"
